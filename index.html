<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aethoria — World Sim</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8f9fa;color:#212529;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:44px;background:#fff;border-bottom:1px solid #dee2e6;display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
#world-title{font-weight:700;font-size:15px;color:#495057;letter-spacing:.5px}
#clock-display{font-family:'Courier New',monospace;font-size:13px;color:#495057;background:#f1f3f5;padding:3px 10px;border-radius:4px;min-width:90px;text-align:center}
.speed-btn{padding:3px 9px;border:1px solid #ced4da;background:#fff;border-radius:4px;cursor:pointer;font-size:12px;color:#495057;transition:all .15s}
.speed-btn:hover{background:#e9ecef}
.speed-btn.active{background:#4dabf7;color:#fff;border-color:#4dabf7}
#day-counter{font-size:12px;color:#868e96;margin-left:auto;font-family:'Courier New',monospace}
#main-layout{flex:1;display:flex;overflow:hidden}
.panel{width:220px;background:#fff;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#left-panel{border-right:1px solid #dee2e6}
#right-panel{border-left:1px solid #dee2e6}
.panel-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#868e96;padding:9px 14px 6px;border-bottom:1px solid #f1f3f5;flex-shrink:0}
.panel-section{padding:9px 14px;border-bottom:1px solid #f1f3f5;flex-shrink:0}
.panel-section-title{font-size:10px;font-weight:600;color:#adb5bd;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
#npc-list{flex:1;overflow-y:auto;padding:4px 6px}
.npc-item{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:5px;cursor:pointer;margin-bottom:1px}
.npc-item:hover{background:#f8f9fa}
.npc-item.selected{background:#e7f5ff}
.npc-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.npc-name{font-size:11px;font-weight:500;color:#343a40;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.npc-badge{font-size:10px;color:#868e96;flex-shrink:0}
.hbar{height:2px;background:#e9ecef;border-radius:1px;margin-top:2px}
.hfill{height:100%;border-radius:1px;background:#51cf66;transition:width .4s}
#inspector{padding:10px 14px;border-top:1px solid #dee2e6;min-height:120px;background:#f8f9fa;flex-shrink:0}
#inspector-name{font-size:12px;font-weight:700;color:#343a40;margin-bottom:3px}
.irow{display:flex;justify-content:space-between;font-size:11px;color:#495057;margin-bottom:3px}
.ival{font-family:'Courier New',monospace;color:#228be6}
.stat-row{display:flex;justify-content:space-between;font-size:11px;color:#495057;margin-bottom:4px}
.sval{font-family:'Courier New',monospace;font-weight:600;color:#343a40}
.sval.pos{color:#37b24d}.sval.neg{color:#f03e3e}
.price-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0;border-bottom:1px solid #f8f9fa}
.price-name{color:#495057}.price-val{font-family:'Courier New',monospace;color:#343a40}
.slider-row{margin-bottom:9px}
.slider-label{display:flex;justify-content:space-between;font-size:11px;color:#495057;margin-bottom:3px}
.slider-val{font-family:'Courier New',monospace;color:#228be6;font-weight:600}
input[type=range]{width:100%;height:4px;accent-color:#4dabf7;cursor:pointer}
.ck-label{display:flex;align-items:center;gap:6px;font-size:11px;color:#495057;margin-bottom:5px;cursor:pointer}
.ck-label input{accent-color:#4dabf7;cursor:pointer}
#event-log{flex:1;overflow-y:auto;padding:5px 12px}
.ev{padding:3px 0;border-bottom:1px solid #f8f9fa;font-size:10px;color:#495057;line-height:1.4}
.ev .et{color:#adb5bd;font-family:monospace;margin-right:4px}
.ev.govern{color:#7048e8}.ev.economy{color:#1971c2}.ev.social{color:#2f9e44}
#canvas-area{flex:1;position:relative;overflow:hidden;background:#c8b99a}
#game-canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#bottombar{height:26px;background:#f1f3f5;border-top:1px solid #dee2e6;display:flex;align-items:center;padding:0 14px;gap:16px;flex-shrink:0;font-size:10px;color:#868e96;font-family:'Courier New',monospace}
#bottombar b{color:#495057}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:#f8f9fa}
::-webkit-scrollbar-thumb{background:#ced4da;border-radius:2px}
</style>
</head>
<body>

<div id="topbar">
  <span id="world-title">⚔ Aethoria</span>
  <span id="clock-display">06:00 ☀</span>
  <button class="speed-btn active" data-speed="1">1×</button>
  <button class="speed-btn" data-speed="2">2×</button>
  <button class="speed-btn" data-speed="4">4×</button>
  <button class="speed-btn" data-speed="0">⏸</button>
  <span id="day-counter">Day 1</span>
</div>

<div id="main-layout">
  <div class="panel" id="left-panel">
    <div class="panel-title">NPCs</div>
    <div id="npc-list"></div>
    <div id="inspector">
      <div id="inspector-name" style="color:#adb5bd;font-size:12px">Select an NPC</div>
    </div>
  </div>

  <div id="canvas-area">
    <canvas id="game-canvas"></canvas>
  </div>

  <div class="panel" id="right-panel">
    <div class="panel-title">Economy</div>
    <div class="panel-section">
      <div class="panel-section-title">Treasury</div>
      <div class="stat-row"><span>Balance</span><span class="sval pos" id="sv-treasury">$5000</span></div>
      <div class="stat-row"><span>Daily Income</span><span class="sval" id="sv-income">$0</span></div>
      <div class="stat-row"><span>Avg Happiness</span><span class="sval" id="sv-happy">80%</span></div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Market Prices</div>
      <div class="price-row"><span class="price-name">Food</span><span class="price-val" id="pv-food">$10.0</span></div>
      <div class="price-row"><span class="price-name">Wood</span><span class="price-val" id="pv-wood">$15.0</span></div>
      <div class="price-row"><span class="price-name">Stone</span><span class="price-val" id="pv-stone">$20.0</span></div>
      <div class="price-row"><span class="price-name">Luxury</span><span class="price-val" id="pv-luxury">$50.0</span></div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Policies</div>
      <div class="slider-row">
        <div class="slider-label"><span>Tax Rate</span><span class="slider-val" id="sv-tax">10%</span></div>
        <input type="range" id="sl-tax" min="0" max="50" value="10">
      </div>
      <div class="slider-row">
        <div class="slider-label"><span>Wage Floor</span><span class="slider-val" id="sv-wage">$10</span></div>
        <input type="range" id="sl-wage" min="5" max="50" value="10">
      </div>
      <div class="slider-row">
        <div class="slider-label"><span>Infra Spend</span><span class="slider-val" id="sv-infra">20%</span></div>
        <input type="range" id="sl-infra" min="0" max="50" value="20">
      </div>
      <label class="ck-label"><input type="checkbox" id="ck-trade" checked> Open Trade</label>
      <label class="ck-label"><input type="checkbox" id="ck-guards" checked> Guard Patrols</label>
    </div>
    <div class="panel-title">Event Log</div>
    <div id="event-log"></div>
  </div>
</div>

<div id="bottombar">
  FPS: <b id="db-fps">60</b> &nbsp;|&nbsp;
  NPCs: <b id="db-npcs">0</b> &nbsp;|&nbsp;
  Batch: <b id="db-batch">0/0</b> &nbsp;|&nbsp;
  <b id="db-event" style="color:#7048e8">—</b>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
